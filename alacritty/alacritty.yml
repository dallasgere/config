window:
  # for whatever reason this fixes stuttering
  opacity: .999

  dimensions:
    columns: 300
    lines: 150

font:
  size: 14.0

  normal:
    family: JetBrains Mono
    style: Regular

  bold:
    family: JetBrains Mono
    style: Bold

  italic:
    family: JetBrains Mono
    style: Italic

  bold_italic:
    family: JetBrains Mono
    style: Bold Italic

colors:
  primary:
    background: "#161616"
    foreground: "#ffffff"

  search:
    matches:
      foreground: '#000000'
      background: '#1AE642'
    focused_match:
      foreground: '#000000'
      background: '#ff00ff'

key_bindings:
  - { key: Right, mods: Alt, chars: "\x1BF" }
  - { key: Left,  mods: Alt, chars: "\x1BB" }
